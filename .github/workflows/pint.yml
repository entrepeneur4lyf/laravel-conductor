name: Pint

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/pint.yml'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/pint.yml'

jobs:
  pint:
    name: pint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4

      - name: Run Pint
        run: ./vendor/bin/pint --test
